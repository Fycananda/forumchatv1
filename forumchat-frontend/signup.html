<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Signup</title>
</head>

<body class="h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-6 rounded-lg shadow-md w-80">
        <h2 class="text-xl font-bold mb-4 text-center">Daftar Akun</h2>
        <form id="signup-form" class="space-y-4">
            <input type="text" id="username" placeholder="Username" class="w-full p-2 border rounded" required>
            <input type="password" id="password" placeholder="Password" class="w-full p-2 border rounded" required>
            <button type="submit" class="w-full bg-green-500 text-white py-2 rounded">Daftar</button>
        </form>
        <p class="text-sm text-gray-500 mt-3 text-center">
            Sudah punya akun? <a href="login.html" class="text-blue-500">Login</a>
        </p>
    </div>

    <script>
        document.getElementById("signup-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            const res = await fetch("https://forumchatv1-production-b7ec.up.railway.app/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            alert(data.message);
            if (res.ok) window.location.href = "login.html";
        });
    </script>
</body>

</html>
