<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Chat</title>
</head>

<body class="h-screen flex bg-gray-100">
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white p-4 flex flex-col">
        <h2 class="text-xl font-bold mb-4">Forum Chat</h2>
        <button onclick="logout()" class="bg-red-500 p-2 rounded">Logout</button>
    </aside>

    <!-- Chat Area -->
    <main class="flex-1 flex flex-col">
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

        <form id="chat-form" class="p-4 border-t flex">
            <input id="chat-input" type="text" placeholder="Ketik pesan..." class="flex-1 p-2 border rounded-lg">
            <button class="ml-2 px-4 py-2 bg-green-500 text-white rounded-lg">Kirim</button>
        </form>
    </main>

    <!-- Socket.io -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // 🔐 cek login
        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        // 🔌 konek ke backend
        const socket = io("https://forumchatv1-production-e591.up.railway.app");

        const form = document.getElementById("chat-form");
        const input = document.getElementById("chat-input");
        const messages = document.getElementById("messages");

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            if (input.value) {
                socket.emit("chat message", input.value);
                input.value = "";
            }
        });

        socket.on("chat message", (msg) => {
            const div = document.createElement("div");
            div.className = "flex justify-end";
            div.innerHTML = `<div class="bg-blue-500 text-white p-3 rounded-lg max-w-lg">${msg}</div>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>

</html>
